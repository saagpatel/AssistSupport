name: SBOM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  emit-sboms:
    name: Generate and attach CycloneDX SBOMs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@1929cdef3ca26202efbfbb4719c58ecf43e84097
        with:
          tool: cargo-cyclonedx

      - name: Generate npm SBOM (CycloneDX)
        run: |
          npx --yes @cyclonedx/cdxgen@latest \
            --spec-version 1.5 \
            --type js \
            --output sbom-npm.cdx.json \
            .

      - name: Generate pip SBOM (CycloneDX)
        working-directory: search-api
        run: |
          python -m pip install --upgrade pip
          python -m pip install cyclonedx-bom==4.1.4
          cyclonedx-py requirements \
            --output-format JSON \
            --output-file ../sbom-pip.cdx.json \
            requirements.txt

      - name: Generate cargo SBOM (CycloneDX)
        working-directory: src-tauri
        run: |
          cargo cyclonedx --format json --override-filename ../sbom-cargo

      - name: List generated SBOMs
        run: ls -la sbom-*.cdx.json sbom-cargo.cdx.json 2>/dev/null || ls -la sbom-*.json

      - name: Upload SBOMs as workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom-${{ github.event.release.tag_name || github.run_id }}
          path: |
            sbom-npm.cdx.json
            sbom-pip.cdx.json
            sbom-cargo.cdx.json
          if-no-files-found: error
          retention-days: 365

      - name: Attach SBOMs to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            sbom-npm.cdx.json \
            sbom-pip.cdx.json \
            sbom-cargo.cdx.json \
            --clobber
