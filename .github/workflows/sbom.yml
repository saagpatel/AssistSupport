name: SBOM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  emit-sboms:
    name: Generate and attach CycloneDX SBOMs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@1929cdef3ca26202efbfbb4719c58ecf43e84097
        with:
          tool: cargo-cyclonedx

      - name: Generate npm SBOM (CycloneDX)
        run: |
          npx --yes @cyclonedx/cdxgen@latest \
            --spec-version 1.5 \
            --type js \
            --output sbom-npm.cdx.json \
            .

      - name: Generate pip SBOM (CycloneDX)
        working-directory: search-api
        run: |
          python -m pip install --upgrade pip
          python -m pip install cyclonedx-bom==4.1.4
          cyclonedx-py requirements \
            --output-format JSON \
            --output-file ../sbom-pip.cdx.json \
            requirements.txt

      - name: Generate cargo SBOM (CycloneDX)
        working-directory: src-tauri
        run: |
          cargo cyclonedx --format json --override-filename ../sbom-cargo

      - name: List generated SBOMs
        run: ls -la sbom-*.cdx.json sbom-cargo.cdx.json 2>/dev/null || ls -la sbom-*.json

      - name: Upload SBOMs as workflow artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-${{ github.event.release.tag_name || github.run_id }}
          path: |
            sbom-npm.cdx.json
            sbom-pip.cdx.json
            sbom-cargo.cdx.json
          if-no-files-found: error
          retention-days: 365

      - name: Attach SBOMs to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            sbom-npm.cdx.json \
            sbom-pip.cdx.json \
            sbom-cargo.cdx.json \
            --clobber
