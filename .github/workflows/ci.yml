name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend-static:
    name: Frontend Static Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Workstation preflight
        run: pnpm run check:workstation-preflight

      - name: Workflow command drift
        run: pnpm run check:workflow-drift

      - name: Typecheck and lint gate
        run: pnpm run ui:gate:static

  frontend-tests:
    name: Frontend Unit + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Run coverage
        run: pnpm test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: coverage/frontend
          if-no-files-found: error
          retention-days: 14

  ui-regression:
    name: UI Visual + A11y
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke lane
        run: pnpm run test:e2e:smoke

      - name: Run visual + accessibility gates
        run: pnpm run ui:gate:regression

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14

  backend-tests:
    name: Rust Backend Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install system dependencies
        run: brew install protobuf pkgconf cmake

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create frontend dist stub
        run: mkdir -p dist && echo '<html></html>' > dist/index.html

      - name: Run backend tests
        run: pnpm run test:ci

      - name: Run security-focused Rust tests
        run: pnpm run test:security-regression

  search-api-tests:
    name: Search API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install redis
        run: sudo apt-get update && sudo apt-get install -y redis-server

      - name: Start redis service
        run: sudo service redis-server start

      - name: Install Search API test dependencies
        working-directory: search-api
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run Search API tests
        working-directory: search-api
        run: |
          source venv/bin/activate
          pytest -q

      - name: Validate production runtime config
        working-directory: search-api
        env:
          ENVIRONMENT: production
          ASSISTSUPPORT_API_KEY: ci-test-key
          ASSISTSUPPORT_RATE_LIMIT_STORAGE_URI: redis://127.0.0.1:6379/0
        run: |
          source venv/bin/activate
          python validate_runtime.py --check-backends --json

      - name: Run production smoke check
        working-directory: search-api
        env:
          ENVIRONMENT: production
          ASSISTSUPPORT_API_KEY: ci-test-key
          ASSISTSUPPORT_RATE_LIMIT_STORAGE_URI: redis://127.0.0.1:6379/0
        run: |
          source venv/bin/activate
          python smoke_search_api.py

  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level high

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo audit
        run: pnpm run test:security:audit:rust

  build:
    name: Build (macOS)
    needs:
      - frontend-static
      - frontend-tests
      - ui-regression
      - backend-tests
      - search-api-tests
      - security-audit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install protobuf pkgconf cmake

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Build Tauri app
        run: pnpm tauri build
