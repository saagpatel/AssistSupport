name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend-static:
    name: Frontend Static Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Workstation preflight
        run: pnpm run check:workstation-preflight

      - name: Workflow command drift
        run: pnpm run check:workflow-drift

      - name: Typecheck and lint gate
        run: pnpm run ui:gate:static

  frontend-tests:
    name: Frontend Unit + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Run coverage
        run: pnpm test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-frontend
          path: coverage/frontend
          if-no-files-found: error
          retention-days: 14

  ui-regression:
    name: UI Visual + A11y
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke lane
        run: pnpm run test:e2e:smoke

      - name: Run visual + accessibility gates
        run: pnpm run ui:gate:regression

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14

  backend-tests:
    name: Rust Backend Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install system dependencies
        run: brew install protobuf pkgconf cmake

      - name: Prepare frontend dist stub
        run: |
          mkdir -p dist
          printf '<!doctype html><html><head><meta charset="utf-8"></head><body></body></html>\n' > dist/index.html

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable

      - name: Run backend tests
        run: pnpm run test:ci

      - name: Run security-focused Rust tests
        run: pnpm run test:security-regression

  search-api-tests:
    name: Search API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: assistsupport_ci
          POSTGRES_PASSWORD: assistsupport_ci
          POSTGRES_DB: assistsupport_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U assistsupport_ci -d assistsupport_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ASSISTSUPPORT_DB_HOST: 127.0.0.1
      ASSISTSUPPORT_DB_PORT: "5432"
      ASSISTSUPPORT_DB_USER: assistsupport_ci
      ASSISTSUPPORT_DB_PASSWORD: assistsupport_ci
      ASSISTSUPPORT_DB_NAME: assistsupport_ci
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install redis
        run: sudo apt-get update && sudo apt-get install -y redis-server

      - name: Start redis service
        run: sudo service redis-server start

      - name: Install Search API test dependencies
        working-directory: search-api
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Run Search API tests
        working-directory: search-api
        run: |
          source venv/bin/activate
          pytest -q

      - name: Validate production runtime config
        working-directory: search-api
        env:
          ENVIRONMENT: production
          ASSISTSUPPORT_API_KEY: ci-test-key
          ASSISTSUPPORT_SEARCH_API_REQUIRE_AUTH: "1"
          ASSISTSUPPORT_RATE_LIMIT_STORAGE_URI: redis://127.0.0.1:6379/0
        run: |
          source venv/bin/activate
          python validate_runtime.py --check-backends --json

      - name: Run production smoke check
        working-directory: search-api
        env:
          ENVIRONMENT: production
          ASSISTSUPPORT_API_KEY: ci-test-key
          ASSISTSUPPORT_SEARCH_API_REQUIRE_AUTH: "1"
          ASSISTSUPPORT_RATE_LIMIT_STORAGE_URI: redis://127.0.0.1:6379/0
        run: |
          source venv/bin/activate
          python smoke_search_api.py

      - name: Verify checked-in OpenAPI contract
        working-directory: search-api
        run: |
          source venv/bin/activate
          python generate_openapi.py > /tmp/assistsupport-search-openapi.json
          diff -u ../openapi/openapi.generated.json /tmp/assistsupport-search-openapi.json

  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level high

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@1929cdef3ca26202efbfbb4719c58ecf43e84097

      - name: Run cargo audit
        run: pnpm run test:security:audit:rust

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip audit
        run: pnpm run test:security:audit:python

  build:
    name: Build (macOS)
    needs:
      - frontend-static
      - frontend-tests
      - ui-regression
      - backend-tests
      - search-api-tests
      - security-audit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install system dependencies
        run: brew install protobuf pkgconf cmake

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Build Tauri app
        run: pnpm tauri build
