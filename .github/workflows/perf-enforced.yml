name: perf-enforced

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main, master]

jobs:
  perf-policy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate enforced performance profile configuration
        run: |
          if [[ "${{ vars.PERF_PROFILE }}" != "production" ]]; then
            echo "PERF_PROFILE is not production; enforced performance lanes are advisory only."
            exit 0
          fi

          missing=0
          if [[ -z "${{ vars.PERF_BASE_URL }}" ]]; then
            echo "PERF_BASE_URL must be set when PERF_PROFILE=production."
            missing=1
          fi

          if [[ -z "${{ vars.PERF_DATABASE_URL }}" ]]; then
            echo "PERF_DATABASE_URL must be set when PERF_PROFILE=production."
            missing=1
          fi

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

  perf-bundle:
    if: ${{ vars.PERF_PROFILE == 'production' }}
    needs: perf-policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c
        with:
          version: 10.28.1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:ui
      - run: pnpm perf:bundle
      - run: node scripts/perf/compare-metric.mjs .perf-baselines/bundle.json .perf-results/bundle.json totalBytes 0.10

  perf-build:
    if: ${{ vars.PERF_PROFILE == 'production' }}
    needs: perf-policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c
        with:
          version: 10.28.1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm perf:build
      - run: node scripts/perf/compare-metric.mjs .perf-baselines/build-time.json .perf-results/build-time.json buildMs 0.15

  perf-assets:
    if: ${{ vars.PERF_PROFILE == 'production' }}
    needs: perf-policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: ASSET_MAX_BYTES=250000 bash scripts/perf/check-assets.sh

  perf-memory:
    if: ${{ vars.PERF_PROFILE == 'production' }}
    needs: perf-policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c
        with:
          version: 10.28.1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: MEMORY_MAX_DELTA_MB=5 pnpm perf:memory

  perf-lighthouse:
    if: ${{ vars.PERF_PROFILE == 'production' }}
    needs: perf-policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c
        with:
          version: 10.28.1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:ui
      - run: pnpm perf:lhci:prod

  perf-api:
    if: ${{ vars.PERF_PROFILE == 'production' && vars.PERF_BASE_URL != '' }}
    needs: perf-policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: grafana/setup-k6-action@ffe7d7290dfa715e48c2ccc924d068444c94bde2
      - run: pnpm perf:api
        env:
          BASE_URL: ${{ vars.PERF_BASE_URL }}
          AUTH_TOKEN: ${{ secrets.PERF_API_KEY }}
          API_P95_MS: "250"
          API_P99_MS: "700"

  perf-db:
    if: ${{ vars.PERF_PROFILE == 'production' && vars.PERF_DATABASE_URL != '' }}
    needs: perf-policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: pnpm perf:db:enforce
        env:
          DATABASE_URL: ${{ vars.PERF_DATABASE_URL }}
          DB_MIN_CALLS: "50"
          DB_MAX_MEAN_MS: "100"
