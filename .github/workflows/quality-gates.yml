name: supporting-policy-and-coverage

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  quality:
    name: quality-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20

      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c
        with:
          version: 10.28.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Install gitleaks
        run: |
          GL_VERSION="8.24.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Policy checks
        run: node scripts/ci/require-tests-and-docs.mjs

      - name: Workflow command drift
        run: pnpm run check:workflow-drift

      - name: Version parity
        run: pnpm run check:version-parity

      - name: Verify commands
        env:
          # The dedicated perf-build job owns build timing. Running it again
          # after coverage/UI gates produces noisy runner-load failures.
          VERIFY_SKIP_REGEX: ${{ github.event_name == 'push' && '^(pnpm git:guard:all|bash scripts/ci/run-diff-coverage.sh|pnpm perf:build|node scripts/perf/compare-metric.mjs .perf-baselines/build-time.json .*)$' || '^(pnpm perf:build|node scripts/perf/compare-metric.mjs .perf-baselines/build-time.json .*)$' }}
        run: bash .codex/scripts/run_verify_commands.sh

      - name: Generate coverage report
        run: pnpm test:coverage

      - name: Diff coverage
        if: github.event_name == 'pull_request'
        run: bash scripts/ci/run-diff-coverage.sh

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-artifacts
          path: |
            playwright-report/
            test-results/
            coverage/
