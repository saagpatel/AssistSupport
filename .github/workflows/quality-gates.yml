name: quality-gates

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  quality:
    name: quality-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 20

      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c
        with:
          version: 10.28.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Install gitleaks
        run: |
          GL_VERSION="8.24.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Policy checks
        run: node scripts/ci/require-tests-and-docs.mjs

      - name: Workflow command drift
        run: pnpm run check:workflow-drift

      - name: Version parity
        run: pnpm run check:version-parity

      - name: Verify commands
        env:
          VERIFY_SKIP_REGEX: ${{ github.event_name == 'push' && '^pnpm git:guard:all$' || '' }}
        run: bash .codex/scripts/run_verify_commands.sh

      - name: Generate coverage report
        run: pnpm test:coverage

      - name: Diff coverage
        run: |
          python3 -m pip install --upgrade pip diff-cover
          BASE_REF="$(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/@@')"
          python3 -m diff_cover.diff_cover_tool coverage/frontend/lcov.info \
            --compare-branch="${BASE_REF}" \
            --fail-under=90 \
            --include "src/**/*.ts" "src/**/*.tsx" \
            --exclude "src/**/*.test.ts" "src/**/*.test.tsx" "src/**/*.spec.ts" "src/**/*.spec.tsx"

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-artifacts
          path: |
            playwright-report/
            test-results/
            coverage/
